trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  buildName: 'dotnet-payment-app'

steps:
- task: UseDotNet@2
  displayName: 'Use .NET 10'
  inputs:
    packageType: sdk
    version: '10.0.x'

- script: |
    curl -fL https://install-cli.jfrog.io | sh
    echo "##vso[task.prependpath]$(pwd)"
    jf --version
  displayName: 'Install JFrog CLI'

- script: |
    jf config add solenglatest \
      --url=$(JF_URL) \
      --user=$(JF_USER) \
      --password=$(JF_PASSWORD) \
      --interactive=false
    jf rt ping
  displayName: 'Configure JFrog CLI and ping Artifactory'
  env:
    JF_URL: $(JF_URL)
    JF_USER: $(JF_USER)
    JF_PASSWORD: $(JF_PASSWORD)

- task: ArtifactoryNuGet@2
  displayName: 'Restore NuGet packages via Artifactory'
  inputs:
    command: 'restore'
    artifactoryService: 'Artifactory'
    targetResolveRepo: 'alpha-nuget-virtual'
    solutionPath: 'sample-dotnet-project.sln'
    nugetProtocolVersion: 'v3'

- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: 'build'
    projects: 'sample-dotnet-project.csproj'
    arguments: '--configuration $(buildConfiguration) --no-restore'

- task: DotNetCoreCLI@2
  displayName: 'Pack NuGet package'
  inputs:
    command: 'pack'
    packagesToPack: 'sample-dotnet-project.csproj'
    configuration: '$(buildConfiguration)'
    outputDir: '$(Build.ArtifactStagingDirectory)/nupkg'
    nobuild: true

- script: |
    jf rt u "$(Build.ArtifactStagingDirectory)/nupkg/*.nupkg" \
      alpha-nuget-virtual/$(buildName)/$(Build.BuildNumber)/ \
      --module=sample-dotnet-project \
      --build-name=$(buildName) \
      --build-number=$(Build.BuildNumber)
  displayName: 'Publish NuGet package to Artifactory'

- script: |
    jf rt bce $(buildName) $(Build.BuildNumber)
    jf rt bag $(buildName) $(Build.BuildNumber)
    jf rt bp  $(buildName) $(Build.BuildNumber)
  displayName: 'Publish build-info to Artifactory'

- script: jf rt bs $(buildName) $(Build.BuildNumber)
  displayName: 'Build scan (Xray)'
