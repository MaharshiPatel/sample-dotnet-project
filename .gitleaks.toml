# Gitleaks configuration
# Docs: https://github.com/gitleaks/gitleaks
title = "ToddlerToys gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Plaid and Affirm sandbox placeholder values (not real credentials)"
regexes = [
    '''sandbox_client_id''',
    '''sandbox_secret''',
    '''sandbox_private_key''',
]

[[allowlists]]
description = "NuGet package content hashes in packages.lock.json are not secrets"
paths = [
    '''packages\.lock\.json''',
]

[[allowlists]]
description = "pre-commit hook comment used a partial base64 example that looked like a token (fixed in next commit)"
commits = [
    "16a4f10c9656224d9a57c426c1ad63766662f414",
]
